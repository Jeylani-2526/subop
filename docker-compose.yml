# =============================================================================
# SUBOP — Docker Compose Development Environment
# Defines the full local development stack for all three team members.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# M1–M2 only (no API yet):
#   docker compose up -d postgres pgadmin zookeeper kafka kafka-ui
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Primary data warehouse and platform metadata database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: subop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Database administration UI
  # Access at http://localhost:5050
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: subop-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ---------------------------------------------------------------------------
  # Apache Zookeeper — Kafka cluster coordination service
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: subop-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    healthcheck:
      test:     ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ---------------------------------------------------------------------------
  # Apache Kafka 3.7 — Message broker for CDC events and streaming ingestion
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: subop-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    ports:
      - "9092:9092"
    healthcheck:
      test:     ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ---------------------------------------------------------------------------
  # Kafka UI — Web interface for Kafka topic and consumer management
  # Access at http://localhost:8080
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: subop-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             subop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER:        zookeeper:2181
    ports:
      - "8080:8080"

  # ---------------------------------------------------------------------------
  # SUBOP API — FastAPI + Uvicorn backend
  # Activated in M3 after CI/CD setup. Uncomment when Dockerfile is ready.
  # ---------------------------------------------------------------------------
  # subop-api:
  #   build:
  #     context:    ./services
  #     dockerfile: ../infrastructure/docker/Dockerfile.api
  #   container_name: subop-api
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     API_SECRET_KEY: ${API_SECRET_KEY}
  #     API_DEBUG:      ${API_DEBUG}
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./services:/app
  #   healthcheck:
  #     test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 15s
  #     timeout:  5s
  #     retries:  3

# =============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  default:
    name: subop-network
