name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint (Black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install black flake8

      - name: Check formatting with Black
        run: |
          if find services/ -name "*.py" | grep -q .; then
            black --check services/
          else
            echo "No Python files yet — skipping Black check."
          fi

      - name: Lint with flake8
        run: |
          if find services/ -name "*.py" | grep -q .; then
            flake8 services/ --max-line-length=100 --exclude=.venv,venv,__pycache__
          else
            echo "No Python files yet — skipping flake8."
          fi

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       subop_test
          POSTGRES_USER:     subop_test
          POSTGRES_PASSWORD: subop_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ -f services/requirements-dev.txt ]; then
            pip install -r services/requirements-dev.txt
          else
            pip install pytest psycopg2-binary
          fi

      - name: Run tests
        run: |
          if find services/ -name "test_*.py" | grep -q .; then
            pytest services/ -v --tb=short
          else
            echo "No test files yet — skipping pytest."
          fi
        env:
          DATABASE_URL: postgresql://subop_test:subop_test@localhost:5432/subop_test
